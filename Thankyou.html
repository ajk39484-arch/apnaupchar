<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>
body{
    font-family: Arial;
    background:#4CAF50; /* Green Background */
    text-align:center;
    padding:40px;
}
.box{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:350px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h2{ color:green; }

.info{
    margin-top:15px;
    font-size:18px;
}

/* Button Style */
.home-btn{
    margin-top:20px;
    padding:10px 20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
.home-btn:hover{
    background:#388E3C;
}
</style>
</head>

<body>

<div class="box">
    <h2>🎉 Thank You!</h2>
    <p>आपका ऑर्डर सफलतापूर्वक दर्ज हो गया है</p>
    <p>हमारी हेल्थ केयर टीम आपसे जल्द ही संपर्क करेगी</p>

    <div class="info">
        <p><b>नाम:</b> <span id="name"></span></p>
        <p><b>मोबाइल:</b> <span id="phone"></span></p>
    </div>

    <!-- Back Home Button -->
    <button class="home-btn" onclick="goHome()">🏠 Back Home</button>
</div>

<script>
// GET DATA
document.getElementById("name").innerText = localStorage.getItem("custName") || "N/A";
document.getElementById("phone").innerText = localStorage.getItem("custPhone") || "N/A";

// Redirect Function
function goHome(){
    window.location.href = "index.html"; // apne home page ka naam yaha daal sakta hai
}
</script>

</body>
</html>
