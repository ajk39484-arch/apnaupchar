<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
  border: 2px dashed #cfd8dc;
}

.top-text {
  text-align: center;
  font-size: 16px;
  margin-bottom: 10px;
}

.top-text span {
  color: red;
  font-weight: bold;
}

.product-img {
  width: 100%;
}

.discount {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
}

.old-price {
  text-decoration: line-through;
  color: #777;
}

.new-price {
  color: red;
  font-size: 28px;
  font-weight: bold;
}

.timer {
  text-align: center;
  font-size: 28px;
  margin: 10px 0;
}

label {
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button {
  width: 100%;
  padding: 14px;
  background: #3b6fd8;
  color: #fff;
  border: none;
  font-size: 18px;
  border-radius: 4px;
}

.note {
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">

  <div class="top-text">
    जल्दी करें! प्रचार पैकेज जल्द ही समाप्त हो जाएंगे। <br>
    अभी केवल <span>17</span> इकाइयाँ शेष हैं।
  </div>

  <center>
<img src="medicine-images.jpeg"width="300">
</center>  

  <div class="discount">
    -75% की छूट <br>
    <span class="old-price">9960 INR</span><br>
    <span class="new-price">2499 INR</span>
  </div>

  <div class="timer" id="timer">10:00</div>

  <form id="orderForm">
    <label>आपका नाम:</label>
    <input type="text" name="name" placeholder="नाम" required>

    <label>आपका फोन:</label>
    <input type="tel" name="phone" placeholder="+91 81234 56789" required>

    <button type="submit">ऑर्डर भेजें</button>
  </form>

  <div class="note">
    *एक पैकेज पर यह छूट एक उपचार का ऑर्डर करने पर मान्य है
  </div>

</div>

<script>
// TIMER
let time = 600; // 10 minutes = 600 seconds
setInterval(() => {
  let min = Math.floor(time / 60);
  let sec = time % 60;

  document.getElementById("timer").innerText =
    String(min).padStart(2, '0') + ":" + String(sec).padStart(2, '0');

  if (time > 0) time--;
}, 1000);

// GOOGLE SHEET
const scriptURL = "https://script.google.com/macros/s/AKfycbzoC2Og1ftcV9UgT14QsmyfAqXsKlerGBOVrE9aUTYw60kAIkMBDUqg7Xig1Aqwaf5Z/exec";

document.getElementById("orderForm").addEventListener("submit", e => {
  e.preventDefault();

  let form = e.target;
  let formData = new FormData(form);
  let btn = form.querySelector("button");

  // 🔥 Button disable + loading text
  btn.innerText = "Please wait... आपका ऑर्डर submit हो रहा है...";
  btn.disabled = true;

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(() => {

    localStorage.setItem("custName", formData.get("name"));
    localStorage.setItem("custPhone", formData.get("phone"));

    window.location.href = "thankyou.html";
  })
  .catch(() => {
    btn.innerText = "ऑर्डर भेजें";
    btn.disabled = false;
    alert("Error! फिर से try करें");
  });

});
</script>

</body>
</html>
