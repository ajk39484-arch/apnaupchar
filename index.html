<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicine</title>

<style>
*{box-sizing:border-box;}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family: Arial, sans-serif;
    background:white;
    overflow-x:hidden;
}

/* 📱 MOBILE CONTAINER */
.container{
    max-width:420px;
    margin:auto;
    background:white;
}

/* 🔥 VIDEO FULLSCREEN */
.video-fullscreen{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:90vh;
    background:black;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ❌ CLOSE BUTTON */
.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    font-size:28px;
    color:#ccc;
    cursor:pointer;
    z-index:10000;
    display:none;
}

/* 🎥 VIDEO */
.video-fullscreen video{
    width:100%;
    height:90%;
    object-fit:contain; /* 🔥 better mobile fit */
    background:black;
}

video{
    width:100%;
    border-radius:10px;
}

/* 🧾 TOP TEXT */
.top-bar{
    background:white;
    color:black;
    text-align:center;
    padding:12px;
    font-size:18px; /* 🔥 mobile friendly */
    line-height:1.4;
}

/* 🎬 VIDEO BOX */
.video-section{
    position:relative;
    margin:10px auto;
    width:100%;
    border:3px solid red;
    border-radius:12px;
    padding:8px;
    text-align:center;
    background:black;
}

/* ▶ OVERLAY */
.video-overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    
}

.overlay-box{
    background:rgba(0,0,0,0.8);
    color:white;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

/* ▶ PLAY BUTTON */
.play-circle{
    width:70px;
    height:70px;
    border:2px solid white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:10px auto;
    font-size:20px;
     background:green;
    animation: blink 1s infinite;
}

/* 🛒 ORDER BUTTON */
.order{
    text-align:center;
    padding:15px;
}

.order button{
    width:90%; /* 🔥 full mobile width */
    max-width:300px;
    font-size:18px;
    background:red;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}

/* 💬 COMMENTS */
.comment-box{
    display:flex;
    gap:8px;
    background:#f0f2f5;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.dp{
    width:30px;
    height:30px;
    border-radius:50%;
}

.comment-content{
    flex:1;
}

.comment-name{
    font-weight:bold;
    font-size:13px;
}

.comment-text{
    font-size:13px;
}

.stars{
    color:red;
    font-size:12px;
}

.like,.reply{
    font-size:12px;
    color:#1877f2;
    cursor:pointer;
    margin-right:8px;
}

.time{
    font-size:10px;
    color:gray;
}

.verified{
    color:#1877f2;
    font-size:11px;
}

/* 🔥 BODY LOCK */
body.fullscreen-active{
    overflow:hidden;
}

/* 🔥 बाकी page hide */
body.fullscreen-active .container > *:not(.video-section){
    display:none;
}
</style>
</head>
<body>
     <script>
if (/FBAN|FBAV/i.test(navigator.userAgent)) {
  alert("Please open in Chrome for better experience");
}
</script>
<div class="container">
<div class="top-bar">
  <p>रक्त शर्करा के स्तर को सामान्य करने का सबसे असरदार देसी तरीका सिर्फ 4 घंटे में! – जिन 94% लोगों ने यह वीडियो अंत तक देखा, उनके शुगर के स्तर 4 घंटे में ही सामान्य हो गए!
</div>

<!-- VIDEO -->
<div class="video-section" id="videoBox">
<!-- ❌ BUTTON -->
<div class="close-btn" onclick="goOrder()">❌</div>

<video id="vid" muted>
<source src="myvideo.mp4" type="video/mp4">
</video>
<div class="video-overlay" id="overlay" onclick="playVideo()">
    <div class="overlay-box">
        <div>वीडियो शुरू हो गया है</div>
        <div class="play-circle">🔊 ▶</div>
        <div>सुनने के लिए क्लिक करे</div>
    </div>
</div>
</div>

<center>
<img src="channels-images.jpeg" width="400">
</center>

<div class="order">
<button onclick="goOrder()">अभी ऑर्डर करें</button>
</div>

<script>
function playVideo(){
    let video = document.getElementById("vid");
    let overlay = document.getElementById("overlay");
    let box = document.getElementById("videoBox");
    let closeBtn = document.querySelector(".close-btn");

    overlay.style.display = "none";

    box.classList.add("video-fullscreen");
    document.body.classList.add("fullscreen-active");

    closeBtn.style.display = "block";

    video.muted = false;   // 🔥 CLICK पर आवाज़ ON
    video.play();

}

// 🔥 SEEK BLOCK (forward/back disable)
let lastTime = 0;
let video = document.getElementById("vid");

video.addEventListener("timeupdate", function(){
    if (video.currentTime > lastTime + 0.5) {
        video.currentTime = lastTime;
    }
    lastTime = video.currentTime;
});

// 🔥 PAUSE = REDIRECT
video.addEventListener("pause", function(){
    goOrder();
});

// 🔥 VIDEO END = REDIRECT
video.addEventListener("ended", function(){
    goOrder();
});

// 🔥 EXIT FULLSCREEN / TAB CHANGE = REDIRECT
document.addEventListener("visibilitychange", function(){
    if(document.hidden){
        goOrder();
    }
});

// ❌ BUTTON CLICK
function goOrder(){
    window.location.href = "Order.html";
}
// 🔥 BACK BUTTON BLOCK + REDIRECT
history.pushState(null, null, location.href);

window.addEventListener("popstate", function () {
    goOrder();
});

</script>
<div style="background:white;padding:15px;">

<h2 style="text-align:center;">हमारे खुश ग्राहकों की टिप्पणियाँ</h2>

<div id="comments"></div>

<div style="margin-top:15px;text-align:center;">
<input type="text" id="ctext" placeholder="Comment" style="width:90%;padding:8px;"><br><br>
<button onclick="addComment()">Comment करें</button>
</div>

</div>

<script>
function openVideoPage(){
    window.open("video.html", "_blank");
}

// 🔥 NAME BASED DP
function getDP(name){
name = name.toLowerCase();

let girls = ["pooja","neha","meena","rita","suman","kiran","akanksha","avantika"];
let boys = ["rahul","aman","sanjay","vikas","rohit","deepak","ankit","ravi","sunil","karan","ajay"];

if(girls.some(n => name.includes(n))){
return "https://randomuser.me/api/portraits/women/" + Math.floor(Math.random()*50) + ".jpg";
}
else if(boys.some(n => name.includes(n))){
return "https://randomuser.me/api/portraits/men/" + Math.floor(Math.random()*50) + ".jpg";
}
else{
return "https://i.pravatar.cc/40?img=" + Math.floor(Math.random()*70);
}
}

function getTime(){
let times = ["Just now","1 min ago","2 min ago","5 min ago","10 min ago","30 min ago","1 hr ago"];
return times[Math.floor(Math.random()*times.length)];
}

let verifiedUsers = ["Rahul Sharma","Pooja Sharma","Aman Verma"];

let likesData = [123,200,487,564,150,230,320,410];

let comments = [
{name:"रवि पटेल", text:"मुझे वीडियो बहुत छोटा लगा, काश इसमें और चीजें होतीं, लेकिन मुझे यह पसंद आया और मैं सिखाई गई हर चीज को करना शुरू करूंगी। "},
 { name:"अवंतिका", text:"क्या यह वास्तव में काम करता है?" }, { name:"अकांक्षा", text:"हाँ अवंतिका यह वास्तव में काम करता है..." }, { name:"Vikas Singh", text:"Maine pura video dekha, sahi laga" },  { name:"Deepak Kumar", text:"मैंने भी दवा का उपयोग किया और 10 दिन में ही मधुमेह सामान्य हो गया और 45 दिन में ख़त्म हो गई जिसके बाद अभी तक सिकायत नहीं आई" }, 
  { name:"Rohit Yadav", text:"Thanks bhai 🙏 kaafi help mili" }, { name:"Pooja Sharma", text:"सभी जो प्रकार 2 की समस्याओं से पीड़ित हैं, उन्हें इसे देखना चाहिए, जो यह उजागर करता है वह अविश्वसनीय है, मैंने कभी नहीं सोचा था कि यह हो सकता है!" }, { name:"Neha Verma", text:"Abhi tak koi side effect nahi hua 👍" }, { name:"Vikas Singh", text:"समाधान हमेशा वहीं था..." }, { name:"Aman Verma", text:"मैं इस वीडियो को अन्य लोगों को भेजूंगी..." }, { name:"Ravi Kumar", text:"Delivery bhi fast thi 🚚" }, { name:"Meena Devi", text:"मुझे वास्तव में उम्मीद है कि यह काम करेगा, मैंने इतनी सारी चीज़ें आजमाई हैं! लेकिन इसमें पूरा अर्थ है" },  { name:"Rahul Sharma", text:"मैंने इसके बारे में कभी नहीं सुना, यह अजीब लग रहा था लेकिन इसमें बहुत मायने हैं... मैंने इसे आज़माना शुरू कर दिया है, और पहले कुछ दिनों में ही यह काम कर रहा है!" },  
{name:"Aman", text:"Working 100%"},

];

// 🔥 FAKE REPLIES WITH NAME
let fakeReplies = [
{name:"Rohit", text:"Yes sahi hai"},
{name:"ॐ प्रकाश", text:"मैंने भी कोशिश की और फायदा हुआ भाई"},{name:"रवि पटेल", text:"मैंने भी दवा का उपयोग किया और 10 दिन में ही मधुमेह सामान्य हो गया और 45 दिन में ख़त्म हो गई जिसके बाद अभी तक सिकायत नहीं आई"},
];

let replies = {};

function loadComments(){
let container = document.getElementById("comments");
container.innerHTML = "";

for(let i=0;i<comments.length;i++){
let c = comments[i];
let verified = verifiedUsers.includes(c.name) ? `<span class="verified">✔️</span>` : "";

container.innerHTML += `
<div class="comment-box">
<img src="${getDP(c.name)}" class="dp">
<div class="comment-content">
<div class="comment-name">${c.name} ${verified}<span class="time">${getTime()}</span></div>
<div class="comment-text">${c.text}</div>
<div class="stars">★★★★★</div>
<div>
<span class="like" onclick="increaseLike(this)">👍 <span>${likesData[i%likesData.length]}</span></span>
<span class="reply">Reply</span>
</div>
<div id="replyList${i}" class="reply-box"></div>
</div>
</div>`;
}

// replies show
for(let i in replies){
let list = document.getElementById("replyList"+i);
replies[i].forEach(r=>{
list.innerHTML += `
<div class="comment-box">
<img src="${getDP(r.name)}" class="dp">
<div class="comment-content">
<div class="comment-name">${r.name}</div>
<div class="comment-text">${r.text}</div>
</div>
</div>`;
});
}
}

// 🔥 AUTO LIVE REPLY
setInterval(()=>{
let i = Math.floor(Math.random()*comments.length);
if(!replies[i]) replies[i]=[];

let r = fakeReplies[Math.floor(Math.random()*fakeReplies.length)];
replies[i].push(r);

loadComments();
},7000);

function increaseLike(el){
let span = el.querySelector("span");
span.innerText = parseInt(span.innerText)+1;
}

function addComment(){
let input=document.getElementById("ctext");
if(input.value=="") return;
localStorage.setItem("myComment",input.value);
input.value="";
loadComments();
}

window.onload=loadComments;
</script>

</div>
</body>
